name: Deploy SnappyMail to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      migrate_data:
        description: 'Migrate data from old Hostinger (one-time)'
        required: false
        type: boolean
        default: false

env:
  SNAPPYMAIL_VERSION: "2.38.2"
  DATA_PATH: "/var/data/snappymail"

jobs:
  migrate:
    if: ${{ github.event.inputs.migrate_data == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NEW_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.NEW_FTP_HOST }} >> ~/.ssh/known_hosts

      - name: Download data from old Hostinger
        run: |
          mkdir -p migrated-data
          lftp -c "
            set ftp:ssl-allow no;
            open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }} ${{ secrets.FTP_HOST }};
            mirror --verbose /home/u930449354/snappymail-data ./migrated-data/;
            quit
          "
          echo "Downloaded $(find migrated-data -type f | wc -l) files from old instance"

      - name: Upload data to new VPS
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" ./migrated-data/ ${{ secrets.NEW_FTP_USER }}@${{ secrets.NEW_FTP_HOST }}:/var/data/snappymail/

  deploy:
    needs: migrate
    if: always() && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NEW_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.NEW_FTP_HOST }} >> ~/.ssh/known_hosts

      - name: Checkout customizations
        uses: actions/checkout@v4
        with:
          path: custom

      - name: Download official release
        run: |
          wget -q "https://github.com/the-djmaze/snappymail/releases/download/v${SNAPPYMAIL_VERSION}/snappymail-${SNAPPYMAIL_VERSION}.tar.gz"
          mkdir release
          tar -xzf snappymail-*.tar.gz -C release

      - name: Apply themes (replace defaults with custom)
        run: |
          rm -rf release/snappymail/v/${SNAPPYMAIL_VERSION}/themes/*
          cp -r custom/my-overrides/snappymail/* release/snappymail/

      - name: Include plugin source for installer
        run: |
          mkdir -p release/_plugins_source
          cp -r custom/my-overrides/plugins/* release/_plugins_source/

      - name: Create plugin installer script
        run: |
          cat > release/setup-plugins.php << 'PHPEOF'
          <?php
          $dataPath = '/var/data/snappymail/_data_/_default_/plugins/';
          $sourcePath = __DIR__ . '/_plugins_source/';

          if (!is_dir($sourcePath)) {
              die('Error: No plugin source found. Deploy may have failed.');
          }

          if (!is_dir($dataPath)) {
              mkdir($dataPath, 0755, true);
          }

          function copyDir($src, $dst) {
              if (!is_dir($dst)) mkdir($dst, 0755, true);
              foreach (scandir($src) as $file) {
                  if ($file === '.' || $file === '..') continue;
                  if (is_dir("$src/$file")) {
                      copyDir("$src/$file", "$dst/$file");
                  } else {
                      copy("$src/$file", "$dst/$file");
                  }
              }
          }

          copyDir($sourcePath, $dataPath);

          $cachePath = '/var/data/snappymail/_data_/_default_/cache/';
          if (is_dir($cachePath)) {
              $iter = new RecursiveIteratorIterator(
                  new RecursiveDirectoryIterator($cachePath, FilesystemIterator::SKIP_DOTS),
                  RecursiveIteratorIterator::CHILD_FIRST
              );
              foreach ($iter as $item) {
                  $item->isDir() ? @rmdir($item) : @unlink($item);
              }
          }

          echo "<pre>\n";
          echo "Done! Plugins installed and cache cleared.\n\n";
          echo "Installed to: $dataPath\n\n";
          echo "Files:\n";
          $iter = new RecursiveIteratorIterator(
              new RecursiveDirectoryIterator($dataPath, FilesystemIterator::SKIP_DOTS)
          );
          foreach ($iter as $file) {
              echo "  " . str_replace($dataPath, '', $file) . "\n";
          }
          echo "</pre>";
          PHPEOF

      - name: Set data path
        run: |
          cat > release/include.php << 'EOF'
          <?php
          define('APP_DATA_FOLDER_PATH', '/var/data/snappymail/');
          EOF

      - name: Remove data folder from deploy
        run: rm -rf release/data

      - name: Deploy via rsync
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" ./release/ ${{ secrets.NEW_FTP_USER }}@${{ secrets.NEW_FTP_HOST }}:/var/www/snappymail/
