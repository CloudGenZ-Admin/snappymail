name: Deploy SnappyMail to Hostinger

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  SNAPPYMAIL_VERSION: "2.38.2"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout my customizations
        uses: actions/checkout@v4
        with:
          path: custom

      - name: Download official release
        run: |
          wget -q "https://github.com/the-djmaze/snappymail/releases/download/v${SNAPPYMAIL_VERSION}/snappymail-${SNAPPYMAIL_VERSION}.tar.gz"
          mkdir release
          tar -xzf snappymail-*.tar.gz -C release

      - name: Remove old themes and apply custom ones
        run: |
          # Remove all default themes from the release
          rm -rf release/snappymail/v/${SNAPPYMAIL_VERSION}/themes/*
          # Copy our custom themes
          cp -r custom/my-overrides/snappymail/* release/snappymail/ 2>/dev/null || true

      - name: Apply plugin customizations
        run: |
          # Plugins go into the data directory, NOT the webroot
          mkdir -p plugin-deploy
          cp -r custom/my-overrides/plugins/* plugin-deploy/ 2>/dev/null || true

      - name: Prepare cache clear
        run: |
          # Create empty dir - deploying it with dangerous-clean-slate wipes the cache
          mkdir -p empty-cache
          touch empty-cache/.gitkeep

      - name: Set data path
        run: |
          cat > release/include.php << 'EOF'
          <?php
          define('APP_DATA_FOLDER_PATH', '/home/u930449354/snappymail-data/');
          EOF

      - name: Remove data folder from deploy
        run: rm -rf release/data

      - name: Deploy app via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: /public_html/
          local-dir: ./release/

      - name: Deploy plugins via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: /home/u930449354/snappymail-data/_data_/_default_/plugins/
          local-dir: ./plugin-deploy/

      - name: Clear SnappyMail CSS cache
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: /home/u930449354/snappymail-data/_data_/_default_/cache/
          local-dir: ./empty-cache/
          dangerous-clean-slate: true
