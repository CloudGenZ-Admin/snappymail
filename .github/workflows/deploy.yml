name: Deploy SnappyMail to Hostinger

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  SNAPPYMAIL_VERSION: "2.38.2"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout my customizations
        uses: actions/checkout@v4
        with:
          path: custom

      - name: Download official release
        run: |
          wget -q "https://github.com/the-djmaze/snappymail/releases/download/v${SNAPPYMAIL_VERSION}/snappymail-${SNAPPYMAIL_VERSION}.tar.gz"
          mkdir release
          tar -xzf snappymail-*.tar.gz -C release

      - name: Remove old themes and apply custom ones
        run: |
          rm -rf release/snappymail/v/${SNAPPYMAIL_VERSION}/themes/*
          cp -r custom/my-overrides/snappymail/* release/snappymail/ 2>/dev/null || true

      - name: Include plugins for setup script to install
        run: |
          mkdir -p release/_plugins_source
          cp -r custom/my-overrides/plugins/* release/_plugins_source/

      - name: Create plugin installer script
        run: |
          cat > release/setup-plugins.php << 'PHPEOF'
          <?php
          // One-time script: copies plugins to the correct data directory
          // Visit https://mail.cloudgenz.com/setup-plugins.php to run
          $dataPath = '/home/u930449354/snappymail-data/_data_/_default_/plugins/';
          $sourcePath = __DIR__ . '/_plugins_source/';

          if (!is_dir($sourcePath)) {
              die('No plugins source found.');
          }

          // Create plugins directory if needed
          if (!is_dir($dataPath)) {
              mkdir($dataPath, 0755, true);
          }

          // Copy recursively
          function copyDir($src, $dst) {
              if (!is_dir($dst)) mkdir($dst, 0755, true);
              foreach (scandir($src) as $file) {
                  if ($file === '.' || $file === '..') continue;
                  $srcPath = $src . '/' . $file;
                  $dstPath = $dst . '/' . $file;
                  if (is_dir($srcPath)) {
                      copyDir($srcPath, $dstPath);
                  } else {
                      copy($srcPath, $dstPath);
                  }
              }
          }

          copyDir($sourcePath, $dataPath);

          // Clear CSS cache
          $cachePath = '/home/u930449354/snappymail-data/_data_/_default_/cache/';
          if (is_dir($cachePath)) {
              foreach (new RecursiveIteratorIterator(
                  new RecursiveDirectoryIterator($cachePath, FilesystemIterator::SKIP_DOTS),
                  RecursiveIteratorIterator::CHILD_FIRST
              ) as $item) {
                  $item->isDir() ? rmdir($item) : unlink($item);
              }
          }

          echo "Done! Plugins installed and cache cleared.\n";
          echo "Installed to: " . $dataPath . "\n";
          echo "Files:\n";
          foreach (new RecursiveIteratorIterator(new RecursiveDirectoryIterator($dataPath, FilesystemIterator::SKIP_DOTS)) as $file) {
              echo "  " . str_replace($dataPath, '', $file) . "\n";
          }
          PHPEOF

      - name: Set data path
        run: |
          cat > release/include.php << 'EOF'
          <?php
          define('APP_DATA_FOLDER_PATH', '/home/u930449354/snappymail-data/');
          EOF

      - name: Remove data folder from deploy
        run: rm -rf release/data

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: /public_html/
          local-dir: ./release/
